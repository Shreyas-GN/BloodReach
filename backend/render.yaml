services:
  # Django Web Service
  - type: web
    name: pulse-aid-backend
    env: python
    buildCommand: "./scripts/build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-aid-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pulse-aid-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # Redis for Channels
  - type: redis
    name: pulse-aid-redis
    ipAllowList: [] # Only allow internal connections

databases:
  - name: pulse-aid-db
    user: pulse_aid_user
    plan: free # Change to starter for production
